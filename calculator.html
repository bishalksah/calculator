<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .calculator {
        background: #1c1c1c;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        text-align: center;
    }

    h1 {
        color: white;
        margin-bottom: 30px;
    }

    #result {
        width: 100%;
        height: 50px;
        font-size: 22px;
        margin-bottom: 15px;
        border: none;
        border-radius: 10px;
        padding: 10px;
        text-align: right;
        outline: none;
        background: #333;
        color: #fff;
    }

    button {
        width: 60px;
        height: 60px;
        margin: 5px;
        font-size: 18px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        transition: 0.2s;
    }

    /* Number buttons */
    button {
        background: #2d2d2d;
        color: white;
    }

    /* Operator buttons */
    .operator {
        background: orange;
        color: white;
    }

    /* Equal button */
    .equal{
        background: #00c853;
        color: white;
    }

    /* Clear button */
    .reset{
        background: red;
        color: white;
    }

    button:hover {
        transform: scale(1.1);
        opacity: 0.8;
    }
    </style>
</head>
<body>
    <div class="calculator">
    <h1>Simple Calculator</h1>
    <input type="text" id="result" placeholder="Enter Something..."> <br>
    <button onclick="show(1)">1</button>
    <button onclick="show(2)">2</button>
    <button onclick="show(3)">3</button>
    <button onclick="show('+')" class="operator">+</button><br>

    <button onclick="show(4)">4</button>
    <button onclick="show(5)">5</button>
    <button onclick="show(6)">6</button>
    <button onclick="show('-')"class="operator">-</button><br>

    <button onclick="show('7')">7</button>
    <button onclick="show(8)">8</button>
    <button onclick="show(9)">9</button>
    <button onclick="show('*')" class="operator">*</button><br>

    <button onclick="show(0)">0</button>
    <button onclick="show('/')" class="operator">/</button>
    <button onclick="clearscreen()" class="reset">C</button>
    <button onclick="show_process()" class="equal">=</button><br>


    <script>
        function show(val){
        document.getElementById("result").value += val;
        }

        function show_process(){
        let X = document.getElementById("result").value;
        document.getElementById("result").value = eval(X);
        }
        function clearscreen (){
            document.getElementById("result").value = "";
        }
    </script>
    </div>

</body>
</html>
